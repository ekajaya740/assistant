services:
  hermes-gateway:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: hermes-gateway
    restart: unless-stopped
    command: gateway run
    ports:
      - "${HERMES_GATEWAY_PORT:-8642}:8642"
    volumes:
      - ${HERMES_DATA_DIR:-./hermes-data}:/opt/data
    networks:
      - hermes-net
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    # Environment variables are loaded from .env automatically by Docker Compose
    # Pass through Hermes-specific variables
    environment:
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-https://ollama.com/v1}
      - HERMES_INFERENCE_PROVIDER=${HERMES_INFERENCE_PROVIDER:-ollama-cloud}
      - HERMES_MODEL=${HERMES_MODEL:-kimi-k2.5:cloud}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - ANTITHROPIC_API_KEY=${ANTITHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - GATEWAY_ALLOW_ALL_USERS=${GATEWAY_ALLOW_ALL_USERS:-false}

  hermes-dashboard:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: hermes-dashboard
    restart: unless-stopped
    command: dashboard --host 0.0.0.0
    ports:
      - "${HERMES_DASHBOARD_PORT:-9119}:9119"
    volumes:
      - ${HERMES_DATA_DIR:-./hermes-data}:/opt/data
    networks:
      - hermes-net
    environment:
      - GATEWAY_HEALTH_URL=http://hermes-gateway:8642
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    depends_on:
      - hermes-gateway

networks:
  hermes-net:
    driver: bridge
