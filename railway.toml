[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"

[deploy]
startCommand = "gateway run"
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[deploy.variables]]
name = "OLLAMA_API_KEY"
description = "Ollama Cloud API key (get at https://ollama.com/settings/keys)"

[[deploy.variables]]
name = "OLLAMA_BASE_URL"
defaultValue = "https://ollama.com/v1"
description = "Ollama API base URL"

[[deploy.variables]]
name = "HERMES_INFERENCE_PROVIDER"
defaultValue = "ollama-cloud"
description = "Hermes inference provider (e.g. ollama-cloud, custom, openrouter)"

[[deploy.variables]]
name = "HERMES_MODEL"
defaultValue = "kimi-k2.5:cloud"
description = "Default AI model for Hermes"

[[deploy.variables]]
name = "GATEWAY_ALLOW_ALL_USERS"
defaultValue = "false"
description = "Allow all users without an allowlist"

[[deploy.variables]]
name = "TELEGRAM_BOT_TOKEN"
description = "Telegram bot token (optional)"

[[deploy.variables]]
name = "DISCORD_BOT_TOKEN"
description = "Discord bot token (optional)"

[[deploy.variables]]
name = "SLACK_BOT_TOKEN"
description = "Slack bot token (optional)"

[[deploy.variables]]
name = "SLACK_APP_TOKEN"
description = "Slack app token for Socket Mode (optional)"

[[deploy.variables]]
name = "HERMES_TZ"
defaultValue = "UTC"
description = "Container timezone"
